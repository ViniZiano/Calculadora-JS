<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link href="https://fonts.googleapis.com/css2?family=Fraunces&display=swap" rel="stylesheet">
    <link href="index.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
       <div class="calculadora">

    <div class="display">
        <div id="valor-anterior"></div>
        <div id="valor-actual"></div>
    </div>

    <button id="clear">C</button>
    <button id="delete">←</button>
    <button class="operador" value="divide">÷</button>
    <button class="operador" value="multiply">×</button>

    <button class="numero">7</button>
    <button class="numero">8</button>
    <button class="numero">9</button>
    <button class="operador" value="subtract">-</button>

    <button class="numero">4</button>
    <button class="numero">5</button>
    <button class="numero">6</button>
    <button class="operador" value="add">+</button>

    <button class="numero">1</button>
    <button class="numero">2</button>
    <button class="numero">3</button>
    <button class="operador" value="equal">=</button>

    <button class="col-2 numero">0</button>
    <button class="numero">.</button>

</div>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
